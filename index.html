<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Caos Café</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f2ee;
      color: #2c2c2c;
    }

    header {
      background: #1f1f1f;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .hero {
      height: 70vh;
      background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3em;
      background: rgba(0,0,0,0.5);
      padding: 20px;
      border-radius: 10px;
    }

    .section {
      padding: 40px 20px;
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    .btn {
      display: inline-block;
      padding: 12px 20px;
      margin-top: 20px;
      background: #6b4f3b;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      background: #1f1f1f;
      color: white;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>☕ Caos Café</h2>
</header>

<div class="hero">
  <h1>Café de especialidad en San José del Cabo</h1>
</div>

<div class="section">
  <h2>Bienvenido</h2>
  <p>Un espacio para disfrutar café de especialidad, buena comida y un ambiente relajado.</p>
  <a class="btn" href="https://maps.google.com" target="_blank">Cómo llegar</a>
</div>

<div class="section">
  <h2>Menú</h2>
  <p>Espresso · Latte · Matcha · Sandwiches · Postres</p>
</div>

<footer>
  <p>© 2026 Caos Café</p>
</footer>

</body>
</html>
